services:
  # TURN 서버 (coturn) - NAT/방화벽 환경에서 WebRTC 연결을 위한 릴레이
  turn-server:
    image: coturn/coturn:latest
    container_name: pdf-feedback-turn
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped

  # 시그널링 서버
  signaling-server:
    build:
      context: ./signaling-server
      dockerfile: Dockerfile
    container_name: pdf-feedback-signaling
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
    restart: unless-stopped
    networks:
      - pdf-feedback-network

  # 메인 Next.js 애플리케이션
  web-app:
    image: pdf-feedback-app
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: pdf-feedback-web
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOSTNAME=0.0.0.0
      # 시그널링 서버 주소를 컨테이너 이름으로 설정
      - SIGNALING_SERVER_URL=http://signaling-server:4001
    depends_on:
      - signaling-server
    restart: unless-stopped
    networks:
      - pdf-feedback-network

networks:
  pdf-feedback-network:
    driver: bridge

