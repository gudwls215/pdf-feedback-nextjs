services:
  # 시그널링 서버
  signaling-server:
    build:
      context: ./signaling-server
      dockerfile: Dockerfile
    container_name: pdf-feedback-signaling
    ports:
      - "127.0.0.1:4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - ALLOWED_ORIGIN=https://pdf.glotos.com
    restart: unless-stopped
    networks:
      - pdf-feedback-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # 메인 Next.js 애플리케이션
  web-app:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-feedback-web
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOSTNAME=0.0.0.0
      # 시그널링 서버 주소를 컨테이너 이름으로 설정
      - SIGNALING_SERVER_URL=http://signaling-server:4001
    depends_on:
      - signaling-server
    restart: unless-stopped
    networks:
      - pdf-feedback-network

networks:
  pdf-feedback-network:
    driver: bridge

