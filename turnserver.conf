# coturn TURN Server Configuration
# ====================================

# 모든 인터페이스에서 리스닝
listening-ip=0.0.0.0

# 리스닝 포트
listening-port=3478
tls-listening-port=5349

# 릴레이 포트 범위 (라우터에서 포트포워딩 필요)
min-port=49152
max-port=49252

# NAT 환경: 외부 공인 IP / 내부 LAN IP
external-ip=121.170.221.40/192.168.0.100

# 도메인/Realm 설정
realm=pdf.glotos.com
server-name=pdf.glotos.com

# 인증 설정
lt-cred-mech
user=pdfuser:turnpass2026!

# 로깅
log-file=stdout
verbose

# fingerprint
fingerprint

# 보안 설정
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# STUN 기능도 활성화
stun-only=0
